name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.3'

      - run: bun install --frozen-lockfile

      - name: Lint & Format
        run: bun run check

      - name: Type Check
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test
